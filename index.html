<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Anh Thien Nguyen</title>
  <meta name="description" content="Anh-Thien Nguyen — Music Producer / DJ & Software Developer based in Seattle, WA." />
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://www.anhthien.site/" />
  <meta property="og:title"       content="Anh-Thien Nguyen" />
  <meta property="og:description" content="Music Producer / DJ & Software Developer based in Seattle, WA." />
  <meta property="og:image"       content="https://www.anhthien.site/Embed.png" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Anh-Thien Nguyen" />
  <meta name="twitter:description" content="Music Producer / DJ & Software Developer based in Seattle, WA." />
  <meta name="twitter:image"       content="https://www.anhthien.site/Embed.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="loading-screen" id="loadingScreen" aria-live="polite" aria-label="Loading">
    <div class="loading-card">
      <div class="duck-scene" aria-hidden="true">
        <svg viewBox="0 0 100 68" width="96" height="65">
          <ellipse class="duck-water" cx="50" cy="61" rx="36" ry="6" fill="rgba(45,106,79,0.13)"/>
          <g class="duck-body-group">
            <path d="M25 41 Q13 31 18 44 Q20 51 27 48 Z" fill="#f59e0b"/>
            <path d="M27 38 Q16 29 20 42 Q22 49 29 45 Z" fill="#fbbf24"/>
            <ellipse cx="46" cy="44" rx="22" ry="14" fill="#fbbf24"/>
            <ellipse cx="44" cy="46" rx="13" ry="7" fill="#f59e0b" transform="rotate(-10 44 46)"/>
            <circle cx="63" cy="29" r="13" fill="#fbbf24"/>
            <path d="M73 28 L84 26 L84 31 L73 30 Z" fill="#f97316"/>
            <circle cx="80" cy="27.5" r="0.8" fill="#d97706"/>
            <circle cx="68" cy="26" r="2.8" fill="#1a1714"/>
            <circle cx="68.9" cy="25.1" r="1" fill="white"/>
          </g>
        </svg>
      </div>
      <p class="loading-title">Loading</p>
      <div class="loading-dots" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <nav class="topnav">
    <a href="/" class="topnav-brand">
      <img src="profile_picture.jpg" alt="" class="topnav-avatar" />
      Anh Thien
    </a>
    <div class="topnav-links">
      <a href="https://dj.anhthien.site">dj.anhthien.site</a>
      <a href="https://dev.anhthien.site">dev.anhthien.site</a>
      <a href="mailto:anhthientbd@gmail.com" class="topnav-btn">Email</a>
    </div>
  </nav>

  <main>
    <section class="hero">
      <p class="hero-eyebrow animate-on-scroll">Seattle, WA</p>
      <h1 class="animate-on-scroll">Hi, I'm<br>Anh-Thien Nguyen.</h1>
      <p class="hero-desc animate-on-scroll">
        Music producer, DJ, and full-stack developer.
        I make music and build software.
      </p>
      <div class="hero-actions animate-on-scroll">
        <a href="https://dj.anhthien.site" class="hero-btn hero-btn-music">Music &amp; DJ →</a>
        <a href="https://dev.anhthien.site" class="hero-btn hero-btn-cs">Software Dev →</a>
      </div>
    </section>
  </main>

  <footer>
    anhthien.site
  </footer>

  <script>
    const loadingScreen = document.getElementById('loadingScreen');
    window.addEventListener('load', () => {
      setTimeout(() => {
        loadingScreen.classList.add('is-hidden');
        loadingScreen.addEventListener('transitionend', () => loadingScreen.remove(), { once: true });
      }, 600);
    }, { once: true });

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => entry.target.classList.toggle('is-visible', entry.isIntersecting));
    }, { threshold: 0.08 });
    document.querySelectorAll('.animate-on-scroll').forEach(el => observer.observe(el));
  </script>
</body>
</html>
