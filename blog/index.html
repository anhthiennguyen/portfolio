  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const ls = document.getElementById('loadingScreen');
        ls.classList.add('is-hidden');
        ls.addEventListener('transitionend', () => ls.remove(), { once: true });
      }, 500);
    }, { once: true });

  <canvas id="bg-canvas"></canvas>

  <main class="page-single">
    <header class="card">
      <p class="hero-eyebrow">Blog</p>
      <h1 style="font-size: clamp(1.8rem, 5vw, 2.6rem); font-weight: 600; letter-spacing: -0.02em; margin-top: 0.4rem;">Values &amp; Thoughts</h1>
    </header>

    <div id="postList" class="blog-list">
      <div class="card blog-empty">
        <h3>Loading…</h3>
      </div>
    </div>
  </main>

  <footer>
    <a href="https://www.anhthien.site" style="text-decoration:none;color:inherit">anhthien.site</a>

  <script>
    const EMPTY_STATE = `
      <div class="card blog-empty">
        <h3>No posts yet</h3>
        <p>Check back soon — first post is on the way.</p>
      </div>
    `;

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str ?? '';
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(`${dateStr}T00:00:00`);
      if (isNaN(d)) return dateStr;
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function parseXml(text) {
      const doc = new DOMParser().parseFromString(text, 'application/xml');
      if (doc.querySelector('parsererror')) throw new Error('XML parse error');
      return doc;
    }

    function fieldText(doc, tag) {
      return doc.querySelector(tag)?.textContent?.trim() ?? '';
    }

    async function loadPosts() {
      const listEl = document.getElementById('postList');
      try {
        const manifestRes = await fetch('posts/manifest.xml');
        if (!manifestRes.ok) throw new Error('manifest fetch failed');
        const manifestDoc = parseXml(await manifestRes.text());
        const files = [...manifestDoc.querySelectorAll('post')]
          .map((el) => el.getAttribute('file'))
          .filter(Boolean);

        const posts = await Promise.all(files.map(async (file) => {
          try {
            const res = await fetch(`posts/${file}`);
            if (!res.ok) return null;
            const doc = parseXml(await res.text());
            return {
              slug: file.replace(/\.xml$/, ''),
              title: fieldText(doc, 'title') || 'Untitled',
              date: fieldText(doc, 'date'),
              summary: fieldText(doc, 'summary'),
            };
          } catch {
            return null;
          }
        }));

        const valid = posts.filter(Boolean).sort((a, b) => b.date.localeCompare(a.date));

        if (valid.length === 0) {
          listEl.innerHTML = EMPTY_STATE;
          return;
        }

        listEl.innerHTML = valid.map((p) => `
          <a class="card post-card" href="post.html?slug=${encodeURIComponent(p.slug)}">
            <div class="post-card-date">${escapeHtml(formatDate(p.date))}</div>
            <h3 class="post-card-title">${escapeHtml(p.title)}</h3>
            <p class="post-card-summary">${escapeHtml(p.summary)}</p>
          </a>
        `).join('');
      } catch (err) {
        listEl.innerHTML = EMPTY_STATE;
      }
    }

    loadPosts();
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  (function () {
    // ── Campfire scene — cozy island + chibi Thien, ambient background ──
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x8ecae6);
    scene.fog = new THREE.Fog(0x8ecae6, 20, 42);

    const camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 2.2, 4.8);
    camera.lookAt(0, 0.55, 0);

    scene.add(new THREE.AmbientLight(0xffeedd, 0.88));
    const sun = new THREE.DirectionalLight(0xfff8e8, 1.25);
    sun.position.set(8, 14, 6);
    scene.add(sun);
    const fill = new THREE.DirectionalLight(0xc8e0ff, 0.38);
    fill.position.set(-8, 4, 8);
    scene.add(fill);
    const fireLight = new THREE.PointLight(0xff9944, 0.7, 4);
    fireLight.position.set(0.55, 0.95, 0.15);

    // Off-center rig so the island sits in the page margin, not behind the content column
    const rig = new THREE.Group();
    rig.position.set(0, 0, 0);
    scene.add(rig);
    rig.add(fireLight);

    function mesh(geo, color, opts = {}) {
      return new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color, ...opts }));
    }
    function box(w, h, d, c, o)          { return mesh(new THREE.BoxGeometry(w, h, d), c, o); }
    function cyl(rt, rb, h, seg, c, o)   { return mesh(new THREE.CylinderGeometry(rt, rb, h, seg), c, o); }
    function cone(r, h, seg, c, o)       { return mesh(new THREE.ConeGeometry(r, h, seg), c, o); }
    function sph(r, c, o)                { return mesh(new THREE.SphereGeometry(r, 10, 8), c, o); }

    // ── Island ──
    const island = new THREE.Group();
    const rock = cyl(1.1, 0.68, 1.55, 8, 0xa08060);
    rock.position.y = -0.52;
    island.add(rock);
    const dirt = cyl(1.15, 1.1, 0.2, 8, 0x7a5c3a);
    dirt.position.y = 0.36;
    island.add(dirt);
    const grass = cyl(1.2, 1.15, 0.14, 8, 0x6abf6e);
    grass.position.y = 0.48;
    island.add(grass);

    // Campfire logs
    const log1 = cyl(0.055, 0.055, 0.58, 5, 0x8B5E3C);
    log1.rotation.z = Math.PI / 2.5; log1.position.set(-0.13, 0.63, 0.1);
    island.add(log1);
    const log2 = cyl(0.055, 0.055, 0.58, 5, 0x7a4e28);
    log2.rotation.z = -Math.PI / 2.5; log2.position.set(0.13, 0.63, 0.1);
    island.add(log2);
    const flame1 = sph(0.11, 0xff6a00, { emissive: 0xff3300, emissiveIntensity: 0.7 });
    flame1.position.set(0, 0.82, 0.1);
    island.add(flame1);
    const flame2 = sph(0.07, 0xffcc00, { emissive: 0xffaa00, emissiveIntensity: 0.9 });
    flame2.position.set(0, 0.93, 0.1);
    island.add(flame2);
    island.userData.flames = [flame1, flame2];

    // Bench
    const seat = box(0.58, 0.065, 0.19, 0x9e7040);
    seat.position.set(0.6, 0.63, 0.15); island.add(seat);
    [0.42, 0.78].forEach(x => {
      const leg = box(0.055, 0.15, 0.055, 0x7a5530);
      leg.position.set(x, 0.545, 0.15); island.add(leg);
    });

    // Flowers
    [[-0.6, 0.22], [-0.75, -0.28], [0.35, -0.62]].forEach(([x, z]) => {
      const stem = cyl(0.02, 0.02, 0.17, 4, 0x3a8a3a);
      stem.position.set(x, 0.64, z); island.add(stem);
      const petal = sph(0.075, Math.random() > 0.5 ? 0xff88aa : 0xffddaa);
      petal.position.set(x, 0.74, z); island.add(petal);
    });

    // Tree
    const trunk = cyl(0.075, 0.1, 0.58, 5, 0x7a4e28);
    trunk.position.set(-0.48, 0.86, -0.28); island.add(trunk);
    const leaves1 = cone(0.44, 0.68, 6, 0x2d8a4e);
    leaves1.position.set(-0.48, 1.3, -0.28); island.add(leaves1);
    const leaves2 = cone(0.3, 0.5, 6, 0x258040);
    leaves2.position.set(-0.48, 1.66, -0.28); island.add(leaves2);

    rig.add(island);

    // ── Chibi Thien ──
    const catGroup = new THREE.Group();
    const SKIN  = 0xd4956a, HAIR = 0x1c110c, SHIRT = 0xf0f0f0, PK = 0xffb3c6;

    const torso = mesh(new THREE.SphereGeometry(0.23, 8, 7), SHIRT);
    torso.scale.set(1.0, 0.88, 0.82);
    catGroup.add(torso);

    const hairCap = mesh(new THREE.SphereGeometry(0.256, 10, 8, 0, Math.PI * 2, 0, Math.PI * 0.42), HAIR);
    hairCap.position.set(0, 0.425, 0.006);
    catGroup.add(hairCap);
    const hairBack = box(0.38, 0.1, 0.05, HAIR);
    hairBack.position.set(0, 0.35, -0.22);
    catGroup.add(hairBack);

    const catHead = mesh(new THREE.SphereGeometry(0.235, 8, 7), SKIN);
    catHead.position.set(0, 0.425, 0.022);
    catGroup.add(catHead);

    const bangs = box(0.3, 0.055, 0.044, HAIR);
    bangs.position.set(0, 0.522, 0.208);
    catGroup.add(bangs);

    const eyeGeo = new THREE.SphereGeometry(0.027, 6, 5);
    [[-0.076, 0.435, 0.232], [0.076, 0.435, 0.232]].forEach(([x, y, z]) => {
      const eye = mesh(eyeGeo, 0x1a0f0a);
      eye.scale.y = 0.58;
      eye.position.set(x, y, z);
      catGroup.add(eye);
    });
    const noseDot = sph(0.017, 0x1a0f0a);
    noseDot.position.set(0, 0.405, 0.246);
    catGroup.add(noseDot);

    const cheekMats = [];
    const cheekGeo = new THREE.SphereGeometry(0.046, 6, 5);
    [[-0.108, 0.388, 0.22], [0.108, 0.388, 0.22]].forEach(([x, y, z]) => {
      const m = new THREE.MeshLambertMaterial({ color: PK, transparent: true, opacity: 0.5 });
      cheekMats.push(m);
      const ch = new THREE.Mesh(cheekGeo, m);
      ch.scale.z = 0.3; ch.position.set(x, y, z);
      catGroup.add(ch);
    });

    const starMat = new THREE.MeshLambertMaterial({ color: 0xf0c040, emissive: 0xd4a010, emissiveIntensity: 0.45 });
    const starGeo = new THREE.OctahedronGeometry(0.075);
    const stars = [
      { pos: [0.58, 0.32, 0.22],  speed: 0.72, phase: 0   },
      { pos: [-0.52, 0.62, 0.04], speed: 0.5,  phase: 2.1 },
      { pos: [0.18, 0.88, -0.16], speed: 0.9,  phase: 4.2 },
    ].map(d => {
      const s = new THREE.Mesh(starGeo, starMat);
      s.position.set(...d.pos);
      s.userData = { base: s.position.clone(), speed: d.speed, phase: d.phase };
      catGroup.add(s);
      return s;
    });

    catGroup.position.set(-0.28, 0.58, 0.25);
    rig.add(catGroup);

    // ── Clouds ──
    function buildCloud(x, y, z) {
      const g = new THREE.Group();
      const m = new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 });
      [[0,0,0,1.1,0.5],[-0.9,0.15,0,0.75,0.42],[0.9,0.1,0,0.82,0.44],[0,0.2,-0.3,0.65,0.38]].forEach(([cx,cy,cz,rx,ry]) => {
        const sp = new THREE.Mesh(new THREE.SphereGeometry(rx, 7, 5), m);
        sp.position.set(cx, cy, cz); sp.scale.y = ry / rx; g.add(sp);
      });
      g.position.set(x, y, z);
      return g;
    }
    const clouds = [
      buildCloud(-7, 4, -5), buildCloud(6, 4.5, -4),
      buildCloud(-2, 5.5, -9), buildCloud(8, 3.5, 0),
      buildCloud(-9, 4, 1.5),
    ];
    clouds.forEach(c => scene.add(c));

    // ── Resize ──
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── Animate ──
    const BASE_Y = catGroup.position.y;
    function animate() {
      requestAnimationFrame(animate);
      const t = performance.now() * 0.001;

      const flicker = 0.88 + Math.sin(t * 13) * 0.12 + Math.sin(t * 18) * 0.06;
      island.userData.flames.forEach(f => f.scale.setScalar(flicker));
      fireLight.intensity = 0.55 + Math.sin(t * 12) * 0.15;

      const bob = Math.sin(t * 1.15) * 0.025;
      catGroup.position.y = BASE_Y + bob;

      catHead.rotation.z = Math.sin(t * 0.55) * 0.065;

      const blush = 0.44 + Math.sin(t * 1.9) * 0.12;
      cheekMats.forEach(m => { m.opacity = blush; });

      stars.forEach(s => {
        const d = s.userData;
        s.position.y = d.base.y + Math.sin(t * d.speed + d.phase) * 0.085;
        s.rotation.y = t * 1.6 + d.phase;
        s.rotation.x = t * 0.9  + d.phase;
      });

      clouds.forEach((c, i) => { c.position.x += Math.sin(t * 0.05 + i) * 0.002; });

      renderer.render(scene, camera);
    }
    animate();
  })();
  </script>
