  <script>

      setTimeout(() => {
        const ls = document.getElementById('loadingScreen');
        ls.classList.add('is-hidden');
        ls.addEventListener('transitionend', () => ls.remove(), { once: true });

    }, { once: true });

  <nav class="page-nav">

  <main class="page-single">
    <header>
      <p class="hero-eyebrow">Blog</p>
      <h1 style="font-size: clamp(1.8rem, 5vw, 2.6rem); font-weight: 600; letter-spacing: -0.02em; margin-top: 0.4rem;">Writing &amp; Notes</h1>
      <p class="hero-desc" style="margin-top: 0.75rem;">Some thoughts on software, music, and whatever else is stuck in my head. Nothing published yet.</p>
    </header>

    <div id="postList" class="blog-list">
      <div class="card blog-empty">
        <h3>Loading…</h3>
      </div>
    </div>
  </main>

  <footer>
    <a href="https://www.anhthien.site" style="text-decoration:none;color:inherit">anhthien.site</a>
  </footer>

  <script>
    const EMPTY_STATE = `
      <div class="card blog-empty">
        <h3>No posts yet</h3>
        <p>Check back soon — first post is on the way.</p>
      </div>
    `;

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str ?? '';
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(`${dateStr}T00:00:00`);
      if (isNaN(d)) return dateStr;
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function parseXml(text) {
      const doc = new DOMParser().parseFromString(text, 'application/xml');
      if (doc.querySelector('parsererror')) throw new Error('XML parse error');
      return doc;
    }

    function fieldText(doc, tag) {
      return doc.querySelector(tag)?.textContent?.trim() ?? '';
    }

    async function loadPosts() {
      const listEl = document.getElementById('postList');
      try {
        const manifestRes = await fetch('posts/manifest.xml');
        if (!manifestRes.ok) throw new Error('manifest fetch failed');
        const manifestDoc = parseXml(await manifestRes.text());
        const files = [...manifestDoc.querySelectorAll('post')]
          .map((el) => el.getAttribute('file'))
          .filter(Boolean);

        const posts = await Promise.all(files.map(async (file) => {
          try {
            const res = await fetch(`posts/${file}`);
            if (!res.ok) return null;
            const doc = parseXml(await res.text());
            return {
              slug: file.replace(/\.xml$/, ''),
              title: fieldText(doc, 'title') || 'Untitled',
              date: fieldText(doc, 'date'),
              summary: fieldText(doc, 'summary'),
            };
          } catch {
            return null;
          }
        }));

        const valid = posts.filter(Boolean).sort((a, b) => b.date.localeCompare(a.date));

        if (valid.length === 0) {
          listEl.innerHTML = EMPTY_STATE;
          return;
        }

        listEl.innerHTML = valid.map((p) => `
          <a class="card post-card" href="post.html?slug=${encodeURIComponent(p.slug)}">
            <div class="post-card-date">${escapeHtml(formatDate(p.date))}</div>
            <h3 class="post-card-title">${escapeHtml(p.title)}</h3>
            <p class="post-card-summary">${escapeHtml(p.summary)}</p>
          </a>
        `).join('');
      } catch (err) {
        listEl.innerHTML = EMPTY_STATE;
      }
    }

    loadPosts();
  </script>

</body>
