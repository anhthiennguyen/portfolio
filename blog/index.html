  <main class="page-single">
    <header class="card">
      <p class="hero-eyebrow">Blog</p>
      <h1 style="font-size: clamp(1.8rem, 5vw, 2.6rem); font-weight: 600; letter-spacing: -0.02em; margin-top: 0.4rem;">Values &amp; Thoughts</h1>

  <script>
    const EMPTY_STATE = `
      <div class="card blog-empty">
        <h3>No posts yet</h3>
        <p>Check back soon — first post is on the way.</p>
      </div>
    `;

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str ?? '';
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(`${dateStr}T00:00:00`);
      if (isNaN(d)) return dateStr;
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function parseXml(text) {
      const doc = new DOMParser().parseFromString(text, 'application/xml');
      if (doc.querySelector('parsererror')) throw new Error('XML parse error');
      return doc;
    }

    function fieldText(doc, tag) {
      return doc.querySelector(tag)?.textContent?.trim() ?? '';
    }

    async function loadPosts() {
      const listEl = document.getElementById('postList');
      try {
        const manifestRes = await fetch('/posts/manifest.xml');
        if (!manifestRes.ok) throw new Error('manifest fetch failed');
        const manifestDoc = parseXml(await manifestRes.text());
        const files = [...manifestDoc.querySelectorAll('post')]
          .map((el) => el.getAttribute('file'))
          .filter(Boolean);

        const posts = await Promise.all(files.map(async (file) => {
          try {
            const res = await fetch(`/posts/${file}`);
            if (!res.ok) return null;
            const doc = parseXml(await res.text());
            return {
              slug: file.replace(/\.xml$/, ''),
              title: fieldText(doc, 'title') || 'Untitled',
              date: fieldText(doc, 'date'),
              summary: fieldText(doc, 'summary'),
            };
          } catch {
            return null;
          }
        }));

        const valid = posts.filter(Boolean).sort((a, b) => b.date.localeCompare(a.date));

        if (valid.length === 0) {
          listEl.innerHTML = EMPTY_STATE;
          return;
        }

        listEl.innerHTML = valid.map((p) => `
          <a class="card post-card" href="/post.html?slug=${encodeURIComponent(p.slug)}">
            <div class="post-card-date">${escapeHtml(formatDate(p.date))}</div>
            <h3 class="post-card-title">${escapeHtml(p.title)}</h3>
            <p class="post-card-summary">${escapeHtml(p.summary)}</p>
          </a>
        `).join('');
      } catch (err) {
        listEl.innerHTML = EMPTY_STATE;
      }
    }

    loadPosts();
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  (function () {
    // ── Cozy wooden room at night — fireplace, rocking chair, coffee table ──
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const NIGHT = 0x0d0906;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(NIGHT);
    scene.fog = new THREE.Fog(NIGHT, 4, 9);

    const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.35, 3.0);
    camera.lookAt(0, 0.9, -0.6);

    // Dim, cool ambient so the room reads as dark except near the fire
    scene.add(new THREE.AmbientLight(0x2a2420, 0.55));
    const moon = new THREE.DirectionalLight(0x6a7aa8, 0.25);
    moon.position.set(-3, 4, 2);
    scene.add(moon);
    const fireLight = new THREE.PointLight(0xff8a3d, 1.4, 4.5);
    fireLight.position.set(0, 0.85, -0.65);
    scene.add(fireLight);

    const room = new THREE.Group();
    scene.add(room);

    function mesh(geo, color, opts = {}) {
      return new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color, ...opts }));
    }
    function box(w, h, d, c, o)          { return mesh(new THREE.BoxGeometry(w, h, d), c, o); }
    function cyl(rt, rb, h, seg, c, o)   { return mesh(new THREE.CylinderGeometry(rt, rb, h, seg), c, o); }
    function sph(r, c, o)                { return mesh(new THREE.SphereGeometry(r, 10, 8), c, o); }

    const WOOD_DARK   = 0x2a1a10;
    const WOOD_MED    = 0x3d2817;
    const WOOD_PANEL  = 0x33210f;
    const STONE       = 0x554438;
    const STONE_LIGHT = 0x6b5843;

    // ── Room shell (small — back wall, side walls, floor) ──
    const floor = box(3.4, 0.1, 2.6, WOOD_MED);
    floor.position.set(0, -0.05, 0.1);
    room.add(floor);

    const backWall = box(3.4, 2.3, 0.12, WOOD_PANEL);
    backWall.position.set(0, 1.1, -1.15);
    room.add(backWall);

    const leftWall = box(0.12, 2.3, 2.6, WOOD_DARK);
    leftWall.position.set(-1.7, 1.1, 0.1);
    room.add(leftWall);

    const rightWall = box(0.12, 2.3, 2.6, WOOD_DARK);
    rightWall.position.set(1.7, 1.1, 0.1);
    room.add(rightWall);

    // ── Fireplace (centered on the back wall) ──
    const fireplace = new THREE.Group();
    const surround = box(1.3, 1.5, 0.28, STONE);
    surround.position.set(0, 0.75, -0.98);
    fireplace.add(surround);
    const mantle = box(1.5, 0.09, 0.36, STONE_LIGHT);
    mantle.position.set(0, 1.48, -0.95);
    fireplace.add(mantle);
    const firebox = box(0.8, 0.85, 0.16, 0x140d08);
    firebox.position.set(0, 0.5, -0.88);
    fireplace.add(firebox);

    const flog1 = cyl(0.04, 0.04, 0.42, 5, 0x5a3a22);
    flog1.rotation.z = Math.PI / 2.4; flog1.position.set(-0.08, 0.2, -0.82);
    fireplace.add(flog1);
    const flog2 = cyl(0.04, 0.04, 0.42, 5, 0x4a2f1a);
    flog2.rotation.z = -Math.PI / 2.4; flog2.position.set(0.08, 0.2, -0.82);
    fireplace.add(flog2);

    const flame1 = sph(0.1, 0xff6a1f, { emissive: 0xff3300, emissiveIntensity: 0.9 });
    flame1.position.set(0, 0.36, -0.82);
    fireplace.add(flame1);
    const flame2 = sph(0.06, 0xffcc55, { emissive: 0xffaa00, emissiveIntensity: 1.1 });
    flame2.position.set(0, 0.46, -0.82);
    fireplace.add(flame2);
    fireplace.userData.flames = [flame1, flame2];

    room.add(fireplace);

    // ── Carpet in front of the fireplace ──
    const carpet = box(1.7, 0.03, 1.05, 0x5c2626);
    carpet.position.set(0, 0.02, 0.15);
    room.add(carpet);
    const carpetInner = box(1.36, 0.032, 0.75, 0x74302f);
    carpetInner.position.set(0, 0.021, 0.15);
    room.add(carpetInner);

    // ── Rocking chair (right side) ──
    const chair = new THREE.Group();
    const chSeat = box(0.42, 0.06, 0.4, WOOD_MED);
    chSeat.position.set(0, 0.46, 0);
    chair.add(chSeat);
    const chBack = box(0.42, 0.5, 0.06, WOOD_MED);
    chBack.position.set(0, 0.74, -0.19);
    chBack.rotation.x = -0.12;
    chair.add(chBack);
    [-0.19, 0.19].forEach(x => {
      const arm = box(0.05, 0.05, 0.42, WOOD_DARK);
      arm.position.set(x, 0.56, 0.01);
      chair.add(arm);
      const armPost = box(0.05, 0.12, 0.05, WOOD_DARK);
      armPost.position.set(x, 0.5, 0.19);
      chair.add(armPost);
    });
    [-0.16, 0.16].forEach(x => {
      const rocker = new THREE.Mesh(
        new THREE.TorusGeometry(0.34, 0.025, 6, 16, Math.PI * 0.6),
        new THREE.MeshLambertMaterial({ color: WOOD_DARK })
      );
      rocker.position.set(x, 0.2, 0);
      rocker.rotation.z = Math.PI / 2;
      rocker.rotation.y = Math.PI / 2;
      rocker.rotation.x = -Math.PI * 0.3;
      chair.add(rocker);
    });
    chair.position.set(1.15, 0, 0.25);
    chair.rotation.y = -0.55;
    room.add(chair);

    // ── Coffee table (left side) ──
    const table = new THREE.Group();
    const tableTop = box(0.55, 0.05, 0.38, WOOD_MED);
    tableTop.position.set(0, 0.36, 0);
    table.add(tableTop);
    [[-0.22, -0.15], [0.22, -0.15], [-0.22, 0.15], [0.22, 0.15]].forEach(([x, z]) => {
      const leg = cyl(0.025, 0.025, 0.34, 6, WOOD_DARK);
      leg.position.set(x, 0.17, z);
      table.add(leg);
    });
    table.position.set(-1.05, 0, 0.35);
    room.add(table);

    // ── Window with moon + stars (side wall, night sky) ──
    const windowPane = box(0.5, 0.7, 0.02, 0x1a2438, { emissive: 0x141d30, emissiveIntensity: 0.5 });
    windowPane.position.set(-1.63, 1.25, -0.4);
    room.add(windowPane);
    const moonDot = sph(0.06, 0xf5edd0, { emissive: 0xd8cfa0, emissiveIntensity: 0.8 });
    moonDot.position.set(-1.6, 1.4, -0.4);
    room.add(moonDot);
    [[-1.58, 1.15, -0.4], [-1.61, 1.5, -0.4], [-1.6, 1.02, -0.4]].forEach(([x, y, z]) => {
      const star = sph(0.012, 0xffffff, { emissive: 0xffffff, emissiveIntensity: 0.9 });
      star.position.set(x, y, z);
      room.add(star);
    });

    // ── Embers drifting up from the fire ──
    const emberMat = new THREE.MeshLambertMaterial({ color: 0xff9944, emissive: 0xff5500, emissiveIntensity: 0.8 });
    const emberGeo = new THREE.SphereGeometry(0.014, 5, 4);
    const embers = [
      { pos: [-0.06, 0.5, -0.82], speed: 0.5, phase: 0 },
      { pos: [0.08, 0.55, -0.8],  speed: 0.62, phase: 1.6 },
      { pos: [0.0, 0.6, -0.85],   speed: 0.4, phase: 3.2 },
    ].map(d => {
      const e = new THREE.Mesh(emberGeo, emberMat);
      e.position.set(...d.pos);
      e.userData = { base: e.position.clone(), speed: d.speed, phase: d.phase };
      room.add(e);
      return e;
    });

    // ── Resize ──
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── Animate ──
    function animate() {
      requestAnimationFrame(animate);
      const t = performance.now() * 0.001;

      const flicker = 0.85 + Math.sin(t * 13) * 0.15 + Math.sin(t * 19) * 0.08;
      fireplace.userData.flames.forEach(f => f.scale.setScalar(flicker));
      fireLight.intensity = 1.15 + Math.sin(t * 11) * 0.25;

      embers.forEach(e => {
        const d = e.userData;
        const cycle = (t * d.speed + d.phase) % 3;
        e.position.y = d.base.y + cycle * 0.18;
        e.position.x = d.base.x + Math.sin(t * 2 + d.phase) * 0.02;
        e.material.opacity = 1;
      });

      renderer.render(scene, camera);
    }
    animate();
  })();
  </script>
