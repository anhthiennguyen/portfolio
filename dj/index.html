    .animate-on-scroll {

    .stagger-item {

      transform: translateX(-40px);

    .slide-in-text {

      transform: translateX(-40px);
      transition: opacity 0.4s cubic-bezier(0.22,1,0.36,1), transform 0.4s cubic-bezier(0.22,1,0.36,1);
    }
    .slide-in-text-visible {
      opacity: 1;
      transform: translateX(0);
    }
    .letter {
      display: inline-block;
      opacity: 0;
      transform: translateY(100%);
      transition: opacity 0.3s ease, transform 0.3s ease;

    .letter.space { display: inline; }

  <script>
    const loadingScreen = document.getElementById('loadingScreen');
    const MIN_LOAD_TIME = 600;
    const MAX_WAIT_TIME = 4200;
    let loadStartTime = Date.now();
    let iframesLoaded = 0;
    let totalIframes = 0;
    let readyToHide = false;

    function hideLoadingScreen() {
      if (!loadingScreen || loadingScreen.classList.contains('is-hidden')) return;
      loadingScreen.classList.add('is-hidden');
      loadingScreen.addEventListener('transitionend', () => loadingScreen.remove(), { once: true });
    }

    function checkIfReady() {
      const elapsed = Date.now() - loadStartTime;
      if (elapsed >= MIN_LOAD_TIME && (iframesLoaded >= totalIframes || elapsed >= MAX_WAIT_TIME)) {
        if (!readyToHide) { readyToHide = true; hideLoadingScreen(); }
      }
    }

    const iframes = document.querySelectorAll('iframe');
    totalIframes = iframes.length;

    if (totalIframes === 0) {
      window.addEventListener('load', () => setTimeout(checkIfReady, MIN_LOAD_TIME), { once: true });
    } else {
      iframes.forEach(iframe => {
        iframe.addEventListener('load', () => { iframesLoaded++; checkIfReady(); }, { once: true });
        setTimeout(() => {
          if (!iframe.dataset.loaded) { iframesLoaded++; iframe.dataset.loaded = 'true'; checkIfReady(); }
        }, 3000);
      });
      window.addEventListener('load', checkIfReady, { once: true });
    }

    setTimeout(checkIfReady, MAX_WAIT_TIME);

    function splitLetters(el) {
      const nodes = Array.from(el.childNodes);
      el.textContent = '';
      nodes.forEach(node => {
        if (node.nodeType === Node.TEXT_NODE) {
          node.textContent.split('').forEach(ch => {
            const span = document.createElement('span');
            span.textContent = ch;
            span.className = ch === ' ' ? 'letter space' : 'letter';
            el.appendChild(span);
          });
        } else if (node.nodeName === 'BR') {
          el.appendChild(document.createElement('br'));
        } else {
          el.appendChild(node.cloneNode(true));
        }
      });
    }

    function animateLetters(el, baseDelay = 0) {
      el.querySelectorAll('.letter:not(.space)').forEach((span, i) => {
        setTimeout(() => span.classList.add('visible'), baseDelay + i * 15);
      });
    }

    const letterTargets = '.section-label';
    document.querySelectorAll(letterTargets).forEach(el => splitLetters(el));

    const letterObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          animateLetters(entry.target);
        } else {
          entry.target.querySelectorAll('.letter:not(.space)').forEach(span => span.classList.remove('visible'));
        }
      });
    }, { threshold: 0.3 });
    document.querySelectorAll(letterTargets).forEach(el => letterObserver.observe(el));

    const slideTargets = 'h3, .card p, .card a';
    document.querySelectorAll(slideTargets).forEach(el => el.classList.add('slide-in-text'));

    const slideObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        entry.target.classList.toggle('slide-in-text-visible', entry.isIntersecting);
      });
    }, { threshold: 0.2 });
    document.querySelectorAll(slideTargets).forEach(el => slideObserver.observe(el));

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
        } else {
          entry.target.classList.remove('is-visible');
        }
      });
    }, { threshold: 0.06 });
    document.querySelectorAll('.animate-on-scroll').forEach(el => observer.observe(el));
  </script>
